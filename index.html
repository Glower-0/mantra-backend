<style>
    .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #232330; }
    .tab { padding: 10px; cursor: pointer; color: var(--text-muted); font-weight: bold; }
    .tab.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }
    .form-container { display: none; }
    .form-container.active { display: block; }
</style>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <div class="auth-tabs">
            <div class="tab active" onclick="showForm('login')">Ingresar</div>
            <div class="tab" onclick="showForm('register')">Registrarse</div>
        </div>

        <div id="loginForm" class="form-container active">
            <div class="form-group"><label>Correo</label><input type="email" id="loginEmail"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass"></div>
            <button class="submit-btn" onclick="processLogin()">Acceder</button>
        </div>

        <div id="registerForm" class="form-container">
            <div class="form-group"><label>Nombre Completo</label><input type="text" id="regNombre"></div>
            <div class="form-group"><label>Correo</label><input type="email" id="regEmail"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="regPass"></div>
            <div class="form-group">
                <label>Tipo de Usuario</label>
                <select id="regRol" style="width: 100%; padding: 0.8rem; background: #0b0b0f; color: white; border-radius: 8px;">
                    <option value="participante">Participante</option>
                    <option value="organizador">Organizador</option>
                </select>
            </div>
            <button class="submit-btn" onclick="processRegister()">Crear Cuenta</button>
        </div>
    </div>
</div>

<script>
    function showForm(type) {
        document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        if(type === 'login') {
            document.getElementById('loginForm').classList.add('active');
            event.target.classList.add('active'); // Ojo: ajustar si clickea el tab
        } else {
            document.getElementById('registerForm').classList.add('active');
            event.target.classList.add('active');
        }
    }

    async function processRegister() {
        // Aquí conectaremos con tu nueva ruta de backend /api/register
        const userData = {
            nombre: document.getElementById('regNombre').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPass').value,
            rol: document.getElementById('regRol').value
        };

        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });

        const result = await response.json();
        if(response.ok) {
            alert("¡Registro exitoso! Ya puedes iniciar sesión.");
            showForm('login');
        } else {
            alert(result.error || "Error en el registro");
        }
    }
</script>
