<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANTRA - Tu Red de Fiestas</title>
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #8b5cf6;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow-x: hidden;
        }

        /* Efecto de luz de fondo (Atmósfera) */
        .blob {
            position: absolute; width: 300px; height: 300px;
            background: var(--accent-color);
            filter: blur(120px); opacity: 0.15; border-radius: 50%;
            z-index: -1;
        }

        header { padding: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Tarjetas Flotantes */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
        }

        .hero { text-align: center; margin-top: 5rem; }
        .hero h1 { font-size: 4rem; margin-bottom: 1rem; }
        
        .btn-main {
            background: var(--accent-color); padding: 1rem 2rem; border: none;
            border-radius: 50px; color: white; font-weight: bold; cursor: pointer;
            transition: transform 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); }

        /* Modal con Glassmorphism */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { 
            width: 90%; max-width: 400px; 
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab { color: #666; cursor: pointer; font-weight: bold; }
        .tab.active { color: var(--accent-color); }

        input, select { 
            width: 100%; padding: 12px; margin-top: 0.5rem;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 12px; color: white;
        }
    </style>
</head>
<body>
    <div class="blob" style="top: -50px; left: -50px;"></div>
    <div class="blob" style="bottom: -50px; right: -50px;"></div>

    <header>
        <div class="logo">MANTRA</div>
        <button class="btn-main" onclick="openModal()">Entrar</button>
    </header>

    <main class="hero">
        <h1>Vive la noche</h1>
        <p>Conectando el underground de la CDMX.</p>
        <div style="margin-top: 3rem;">
            <div class="glass-card" style="display: inline-block; width: 300px;">
                <h3>Eventos Exclusivos</h3>
                <p style="color: #888;">Acceso directo a los mejores raves de la ciudad.</p>
            </div>
        </div>
    </main>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="tabs">
                <span class="tab active" onclick="switchTab('login')">Login</span>
                <span class="tab" onclick="switchTab('register')">Registro</span>
            </div>
            
            <div id="loginForm">
                <input type="email" placeholder="Correo" id="email">
                <input type="password" placeholder="Contraseña" id="pass">
                <button class="btn-main" style="width: 100%; margin-top: 1rem;" onclick="processLogin()">Acceder</button>
            </div>

            <div id="registerForm" style="display:none;">
                <input type="text" placeholder="Nombre" id="name">
                <input type="email" placeholder="Correo" id="regEmail">
                <input type="password" placeholder="Contraseña" id="regPass">
                <select id="role">
                    <option value="participante">Participante</option>
                    <option value="organizador">Organizador</option>
                </select>
                <button class="btn-main" style="width: 100%; margin-top: 1rem;" onclick="processRegister()">Registrarse</button>
            </div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('loginModal').style.display = 'flex'; }
        
        function switchTab(t) {
            document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = t === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(e => e.classList.toggle('active'));
        }
        
        // ... (Aquí mantienes tu lógica de fetch para el login/register)
    </script>
</body>
</html>
