<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTRA | Comunidad</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#07070a;color:white;min-height:100vh;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:22px 7%;background:#0f0f16;border-bottom:1px solid rgba(255,255,255,.08);}
.logo{font-size:1.9rem;font-weight:800;color:#00bfff;}
.nav-actions{display:flex;gap:12px;align-items:center;}
.nav-btn{padding:10px 16px;border:none;border-radius:14px;background:#1d1d29;color:white;font-weight:600;cursor:pointer;}
.logout{background:#ff4d4d;}
.container{max-width:900px;margin:40px auto;padding:0 20px;}
.hero{margin-bottom:30px;}
.hero h1{font-size:2.7rem;margin-bottom:8px;}
.hero p{color:#aaa;}
.create-box,.post{background:#11111a;border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:25px;margin-bottom:25px;}
textarea{width:100%;height:120px;padding:16px;border:none;border-radius:18px;background:#1d1d29;color:white;resize:none;margin-bottom:15px;}
.publish-btn{width:100%;padding:15px;border:none;border-radius:18px;background:linear-gradient(135deg,#00bfff,#7c3aed);color:white;font-weight:700;cursor:pointer;}
.post-header{display:flex;align-items:center;gap:14px;margin-bottom:15px;}
.avatar{width:48px;height:48px;border-radius:50%;background:#242433;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#777;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.name{font-weight:700;}
.role{font-size:.8rem;color:#00bfff;}
.date{font-size:.8rem;color:#777;}
.content{color:#ddd;line-height:1.6;margin-bottom:15px;}
.event-box{background:#1a1a25;border-radius:18px;overflow:hidden;margin-bottom:15px;}
.event-box img{width:100%;max-height:260px;object-fit:cover;}
.event-title{padding:14px;color:#00bfff;font-weight:700;}
.comment-btn{padding:12px 16px;border:none;border-radius:14px;background:#1d1d29;color:white;cursor:pointer;font-weight:600;}
.comments{margin-top:15px;display:none;}
.comment-item{background:#1a1a25;padding:14px;border-radius:16px;margin-bottom:10px;}
.comment-input{height:80px;margin-top:12px;}
.empty{text-align:center;color:#888;padding:30px;}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">MANTRA</div>
  <div class="nav-actions">

    <button class="nav-btn"
      onclick="window.location.href='feed-eventos.html'">
      🏠 Feed
    </button>

    <button class="nav-btn"
      onclick="window.location.href='comunidad.html'">
      🌐 Comunidad
    </button>

    <button class="nav-btn"
      onclick="window.location.href='social.html'">
      👥 Social
    </button>

    <button class="nav-btn"
      onclick="window.location.href='perfil.html'">
      👤 Perfil
    </button>

    <button class="nav-btn logout"
      onclick="logout()">
      🚪 Salir
    </button>

</div>
</nav>

<main class="container">

<section class="hero">
  <h1>Comunidad MANTRA</h1>
  <p>Comparte experiencias, anuncia eventos e interactúa con otros usuarios.</p>
</section>

<section class="create-box">
  <textarea id="contenidoPublicacion" placeholder="¿Qué quieres compartir con la comunidad?"></textarea>

  <input
    type="file"
    id="imagenPublicacion"
    accept="image/png,image/jpeg,image/jpg,image/webp"
    style="width:100%;padding:14px;border:none;border-radius:16px;background:#1d1d29;color:white;margin-bottom:15px;"
  >

  <button class="publish-btn" onclick="crearPublicacion()">Publicar</button>
</section>

<section id="feedComunidad">
  <p class="empty">Cargando comunidad...</p>
</section>

</main>

<script>
const usuario = JSON.parse(localStorage.getItem('usuarioMantra'));

if(!usuario){
  window.location.href = 'index.html';
}

async function crearPublicacion(){
  const contenido = document.getElementById('contenidoPublicacion').value.trim();
  const imagen = document.getElementById('imagenPublicacion').files[0];

  if(!contenido && !imagen){
    alert('Escribe algo o sube una imagen.');
    return;
  }

  const formData = new FormData();
  formData.append('contenido', contenido);
  formData.append('id_usuario', usuario.id_usuario);
  formData.append('id_evento', '');

  if(imagen){
    formData.append('imagen', imagen);
  }

  try{
    const response = await fetch('/api/comunidad/publicar-imagen',{
      method:'POST',
      body:formData
    });

    const data = await response.json();

    if(!response.ok){
      alert(data.error || 'Error al publicar');
      return;
    }

    document.getElementById('contenidoPublicacion').value = '';
    document.getElementById('imagenPublicacion').value = '';

    cargarComunidad();

  }catch(error){
    console.error(error);
    alert('Error de conexión');
  }
}

async function cargarComunidad(){
  try{
    const response = await fetch('/api/comunidad/feed');
    const publicaciones = await response.json();

    const feed = document.getElementById('feedComunidad');
    feed.innerHTML = '';

    if(publicaciones.length === 0){
      feed.innerHTML = '<p class="empty">Aún no hay publicaciones.</p>';
      return;
    }

    publicaciones.forEach(pub=>{
      const post = document.createElement('div');
      post.className = 'post';

      const fecha = pub.fecha_publicacion
        ? new Date(pub.fecha_publicacion).toLocaleDateString('es-MX')
        : '';

      post.innerHTML = `
        <div class="post-header">
          <div class="avatar">
            ${pub.foto_perfil ? `<img src="${pub.foto_perfil}">` : '👤'}
          </div>
          <div>
            <div class="name">${pub.nombre}</div>
            <div class="role">${pub.rol}</div>
            <div class="date">${fecha}</div>
          </div>
        </div>

        <div class="content">${pub.contenido || ''}</div>

        ${pub.imagen_url ? `
          <div class="event-box">
            <img src="${pub.imagen_url}">
          </div>
        ` : ''}

        ${pub.evento_titulo ? `
          <div class="event-box">
            ${pub.evento_imagen ? `<img src="${pub.evento_imagen}">` : ''}
            <div class="event-title">🎟 ${pub.evento_titulo}</div>
          </div>
        ` : ''}

        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="comment-btn" onclick="darLike(${pub.id_publicacion})">
            ❤️ ${pub.total_likes || 0}
          </button>

          <button class="comment-btn" onclick="toggleComentarios(${pub.id_publicacion})">
            💬 Comentarios
          </button>
        </div>

        <div class="comments" id="comments-${pub.id_publicacion}">
          <div id="lista-comments-${pub.id_publicacion}"></div>

          <textarea class="comment-input" id="input-comment-${pub.id_publicacion}" placeholder="Escribe un comentario..."></textarea>

          <button class="publish-btn" onclick="crearComentario(${pub.id_publicacion})">
            Comentar
          </button>
        </div>
      `;

      feed.appendChild(post);
    });

  }catch(error){
    console.error(error);
    document.getElementById('feedComunidad').innerHTML =
    '<p class="empty">Error cargando comunidad.</p>';
  }
}

async function darLike(idPublicacion){
  try{
    const response = await fetch('/api/comunidad/like',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id_publicacion: idPublicacion,
        id_usuario: usuario.id_usuario
      })
    });

    const data = await response.json();

    if(!response.ok){
      alert(data.error || 'Error dando like');
      return;
    }

    cargarComunidad();

  }catch(error){
    console.error(error);
    alert('Error de conexión');
  }
}

async function toggleComentarios(idPublicacion){
  const box = document.getElementById(`comments-${idPublicacion}`);

  if(box.style.display === 'block'){
    box.style.display = 'none';
    return;
  }

  box.style.display = 'block';
  cargarComentarios(idPublicacion);
}

async function cargarComentarios(idPublicacion){
  try{
    const response = await fetch(`/api/comunidad/comentarios/${idPublicacion}`);
    const comentarios = await response.json();

    const lista = document.getElementById(`lista-comments-${idPublicacion}`);
    lista.innerHTML = '';

    if(comentarios.length === 0){
      lista.innerHTML = '<p style="color:#888;margin-bottom:10px;">Sin comentarios.</p>';
      return;
    }

    comentarios.forEach(com=>{
      lista.innerHTML += `
        <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>${com.nombre}</strong>

        <button
        onclick="agregarAmigo(${com.id_usuario})"
        style="
        background:#00bfff;
        border:none;
        color:white;
        padding:6px 10px;
        border-radius:10px;
        cursor:pointer;
        ">
      ➕ Amigo
        </button>
        </div>
      `;
    });

  }catch(error){
    console.error(error);
  }
}

async function crearComentario(idPublicacion){
  const input = document.getElementById(`input-comment-${idPublicacion}`);
  const comentario = input.value.trim();

  if(!comentario){
    alert('Escribe un comentario.');
    return;
  }

  try{
    const response = await fetch('/api/comunidad/comentar',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        comentario,
        id_publicacion: idPublicacion,
        id_usuario: usuario.id_usuario
      })
    });

    const data = await response.json();

    if(!response.ok){
      alert(data.error || 'Error comentando');
      return;
    }

    input.value = '';
    cargarComentarios(idPublicacion);

  }catch(error){
    console.error(error);
    alert('Error de conexión');
  }
}

function logout(){
  localStorage.removeItem('usuarioMantra');
  window.location.href = 'index.html';
}

cargarComunidad();
</script>

</body>
</html>
