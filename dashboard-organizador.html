<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTRA | Dashboard Organizador</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#07070a;
color:white;
min-height:100vh;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 7%;
background:rgba(15,15,22,.9);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:1.8rem;
font-weight:800;
letter-spacing:2px;
color:#00bfff;
}

.user-box{
display:flex;
gap:15px;
align-items:center;
}

.logout{
background:transparent;
border:1px solid #ff4d4d;
color:#ff4d4d;
padding:10px 18px;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

.dashboard{
padding:40px 7%;
}

.header{
margin-bottom:30px;
}

.header h1{
font-size:2.5rem;
}

.header p{
color:#aaa;
margin-top:8px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:35px;
}

.stat-card{
background:linear-gradient(145deg,#11111a,#181824);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:25px;
}

.stat-card h3{
color:#aaa;
font-size:.95rem;
margin-bottom:10px;
}

.stat-card p{
font-size:2rem;
font-weight:800;
color:#00bfff;
}

.content{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
}

.panel{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:28px;
backdrop-filter:blur(20px);
}

.panel h2{
margin-bottom:22px;
}

.input-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
color:#d1d1d1;
font-size:.95rem;
}

input, select{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:#1b1b24;
color:white;
outline:none;
}

input[type="file"]{
padding:12px;
}

.preview{
width:100%;
height:220px;
border-radius:20px;
background:#14141d;
border:1px dashed rgba(255,255,255,.2);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
margin-bottom:18px;
color:#777;
text-align:center;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

.submit{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00bfff,#7c3aed);
color:white;
font-weight:700;
font-size:1rem;
cursor:pointer;
transition:.3s;
}

.submit:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,191,255,.2);
}

.message{
margin-top:16px;
text-align:center;
font-weight:600;
}

.events-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:22px;
}

.event-card{
background:#14141d;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
overflow:hidden;
transition:.3s;
}

.event-card:hover{
transform:translateY(-5px);
border-color:#00bfff;
}

.event-img{
height:170px;
background:#20202b;
display:flex;
align-items:center;
justify-content:center;
color:#777;
}

.event-img img{
width:100%;
height:100%;
object-fit:cover;
}

.event-info{
padding:20px;
}

.event-info h3{
font-size:1.2rem;
margin-bottom:10px;
}

.event-info p{
color:#aaa;
font-size:.9rem;
margin-bottom:7px;
}

.delete-btn{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:14px;
background:#ff3b3b;
color:white;
font-weight:700;
cursor:pointer;
}

.empty{
color:#999;
padding:20px;
}

@media(max-width:1000px){
.content{
grid-template-columns:1fr;
}
}

@media(max-width:600px){
.navbar{
flex-direction:column;
gap:15px;
}
.header h1{
font-size:2rem;
}
.dashboard{
padding:30px 5%;
}
}
</style>
</head>

<body>

<nav class="navbar">
<div class="logo">MANTRA</div>

<div class="user-box">
<span id="userName">Organizador</span>
<button class="logout" onclick="logout()">Cerrar sesión</button>
</div>
</nav>

<main class="dashboard">

<section class="header">
<h1>Dashboard de Organizador</h1>
<p>Publica eventos, sube promocionales y revisa el rendimiento de tus eventos.</p>
</section>

<section class="stats">
<div class="stat-card">
<h3>Total de eventos</h3>
<p id="totalEventos">0</p>
</div>

<div class="stat-card">
<h3>Total asistentes</h3>
<p id="totalAsistentes">0</p>
</div>

<div class="stat-card">
<h3>Promedio de calificación</h3>
<p id="promedioCalificacion">0.0</p>
</div>
</section>

<section class="content">

<div class="panel">
<h2>Publicar nuevo evento</h2>

<form id="eventoForm">

<div class="input-group">
<label>Título del evento</label>
<input type="text" id="titulo" required>
</div>

<div class="input-group">
<label>Fecha</label>
<input type="date" id="fecha" required>
</div>

<div class="input-group">
<label>Hora</label>
<input type="time" id="hora" required>
</div>

<div class="input-group">
<label>Calle / lugar</label>
<input type="text" id="calle" placeholder="Ej. Foro Indie Rocks" required>
</div>

<div class="input-group">
<label>Ciudad</label>
<input type="text" id="ciudad" placeholder="Ej. Ciudad de México" required>
</div>

<div class="input-group">
<label>Categoría</label>
<select id="id_categoria">
<option value="">Sin categoría</option>
<option value="1">Música</option>
<option value="2">Arte</option>
<option value="3">Tecnología</option>
<option value="4">Fiesta</option>
<option value="5">Cultura</option>
</select>
</div>

<div class="input-group">
<label>Promocional / flyer del evento</label>
<input type="file" id="imagen" accept="image/png,image/jpeg,image/jpg,image/webp">
</div>

<div class="preview" id="preview">
Vista previa del promocional
</div>

<button type="submit" class="submit" id="btnPublicar">
Publicar evento
</button>

<div class="message" id="message"></div>

</form>
</div>

<div class="panel">
<h2>Mis eventos publicados</h2>
<div class="events-grid" id="eventsGrid">
<p class="empty">Cargando eventos...</p>
</div>
</div>

</section>

</main>

<script>
const usuario = JSON.parse(localStorage.getItem('usuarioMantra'));

if(!usuario){
alert('Debes iniciar sesión.');
window.location.href = 'index.html';
}

if(usuario.rol !== 'organizador' && usuario.rol !== 'owner'){
alert('No tienes permiso para entrar aquí.');
window.location.href = 'index.html';
}

document.getElementById('userName').innerText =
`Hola, ${usuario.nombre}`;

const form = document.getElementById('eventoForm');
const message = document.getElementById('message');
const preview = document.getElementById('preview');
const imagenInput = document.getElementById('imagen');

imagenInput.addEventListener('change', () => {
const file = imagenInput.files[0];

if(!file){
preview.innerHTML = 'Vista previa del promocional';
return;
}

const reader = new FileReader();

reader.onload = e => {
preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
};

reader.readAsDataURL(file);
});

form.addEventListener('submit', async e => {
e.preventDefault();

const btnPublicar = document.getElementById('btnPublicar');

if(btnPublicar.disabled){
return;
}

btnPublicar.disabled = true;
btnPublicar.innerText = 'Publicando...';

const formData = new FormData();

formData.append('titulo', document.getElementById('titulo').value);
formData.append('fecha', document.getElementById('fecha').value);
formData.append('hora', document.getElementById('hora').value);
formData.append('calle', document.getElementById('calle').value);
formData.append('ciudad', document.getElementById('ciudad').value);
formData.append('id_categoria', document.getElementById('id_categoria').value);
formData.append('idOrganizador', usuario.id_usuario);

if(imagenInput.files[0]){
formData.append('imagen', imagenInput.files[0]);
}

try{
message.style.color = '#ccc';
message.innerText = 'Publicando evento...';

const response = await fetch('/api/eventos/crear', {
method:'POST',
body:formData
});

const data = await response.json();

if(!response.ok){
message.style.color = '#ff5a5a';
message.innerText = data.error || 'Error al publicar evento';

btnPublicar.disabled = false;
btnPublicar.innerText = 'Publicar evento';

return;
}

message.style.color = '#00ff99';
message.innerText = 'Evento publicado correctamente 🎉';

form.reset();
preview.innerHTML = 'Vista previa del promocional';

await cargarEventos();
await cargarMetricas();

btnPublicar.disabled = false;
btnPublicar.innerText = 'Publicar evento';

}catch(error){
console.error(error);
message.style.color = '#ff5a5a';
message.innerText = 'Error de conexión';

btnPublicar.disabled = false;
btnPublicar.innerText = 'Publicar evento';
}
});
  
cargarEventos();
cargarMetricas();

}catch(error){
console.error(error);
message.style.color = '#ff5a5a';
message.innerText = 'Error de conexión';
}
});

async function cargarEventos(){
try{
const response = await fetch(`/api/eventos/mis-eventos/${usuario.id_usuario}`);
const eventos = await response.json();

const grid = document.getElementById('eventsGrid');
grid.innerHTML = '';

if(eventos.length === 0){
grid.innerHTML = '<p class="empty">Aún no has publicado eventos.</p>';
return;
}

eventos.forEach(evento => {
const card = document.createElement('div');
card.className = 'event-card';

const fecha = evento.fecha
? new Date(evento.fecha).toLocaleDateString('es-MX')
: 'Sin fecha';

card.innerHTML = `
<div class="event-img">
${evento.imagen_url
? `<img src="${evento.imagen_url}" alt="${evento.titulo}">`
: 'Sin promocional'}
</div>

<div class="event-info">
<h3>${evento.titulo}</h3>
<p>📅 ${fecha} ${evento.hora || ''}</p>
<p>📍 ${evento.calle || ''}, ${evento.ciudad || ''}</p>
<p>👥 ${evento.asistentes || 0} asistentes</p>
<p>⭐ ${Number(evento.promedio_calificacion || 0).toFixed(1)}</p>

<button class="delete-btn" onclick="eliminarEvento(${evento.id_evento})">
Eliminar
</button>
</div>
`;

grid.appendChild(card);
});

}catch(error){
console.error(error);
document.getElementById('eventsGrid').innerHTML =
'<p class="empty">Error al cargar eventos.</p>';
}
}

async function cargarMetricas(){
try{
const response = await fetch(`/api/metricas?id_organizador=${usuario.id_usuario}`);
const data = await response.json();

document.getElementById('totalEventos').innerText =
data.total_eventos || 0;

document.getElementById('totalAsistentes').innerText =
data.total_asistentes || 0;

document.getElementById('promedioCalificacion').innerText =
Number(data.promedio_calificacion || 0).toFixed(1);

}catch(error){
console.error(error);
}
}

async function eliminarEvento(idEvento){
const confirmar = confirm('¿Seguro que quieres eliminar este evento?');

if(!confirmar) return;

try{
const response = await fetch(`/api/eventos/eliminar/${idEvento}`, {
method:'DELETE'
});

const data = await response.json();

if(!response.ok){
alert(data.error || 'No se pudo eliminar');
return;
}

cargarEventos();
cargarMetricas();

}catch(error){
console.error(error);
alert('Error de conexión');
}
}

function logout(){
localStorage.removeItem('usuarioMantra');
window.location.href = 'index.html';
}

cargarEventos();
cargarMetricas();
</script>

</body>
</html>
