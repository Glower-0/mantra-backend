<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTRA | Mi Perfil</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#07070a;
color:white;
min-height:100vh;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 7%;
background:rgba(12,12,18,.95);
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:1.8rem;
font-weight:800;
color:#00bfff;
letter-spacing:2px;
}

.nav-actions{
display:flex;
gap:12px;
align-items:center;
}

.nav-btn{
padding:10px 16px;
border:none;
border-radius:14px;
background:#1d1d29;
color:white;
cursor:pointer;
font-weight:600;
}

.logout{
background:#ff4d4d;
}

.profile-container{
max-width:1100px;
margin:40px auto;
padding:0 20px;
}

.profile-card{
background:linear-gradient(145deg,#11111a,#181824);
border:1px solid rgba(255,255,255,.08);
border-radius:32px;
padding:40px;
display:grid;
grid-template-columns:220px 1fr;
gap:35px;
align-items:center;
}

.avatar-box{
text-align:center;
}

.avatar{
width:180px;
height:180px;
border-radius:50%;
background:#242433;
overflow:hidden;
margin:0 auto 20px;
border:4px solid #00bfff;
display:flex;
align-items:center;
justify-content:center;
color:#777;
font-size:.9rem;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.upload-label{
display:block;
padding:12px 16px;
border-radius:16px;
background:#00bfff;
color:white;
font-weight:700;
cursor:pointer;
}

#fotoInput{
display:none;
}

.profile-info h1{
font-size:2.6rem;
margin-bottom:10px;
}

.profile-info p{
color:#bbb;
margin-bottom:12px;
line-height:1.6;
}

.intereses{
display:inline-block;
padding:10px 16px;
background:rgba(0,191,255,.15);
border:1px solid rgba(0,191,255,.3);
border-radius:999px;
color:#00bfff;
font-weight:600;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:35px;
}

.stat{
background:#12121a;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:25px;
text-align:center;
}

.stat h3{
color:#aaa;
font-size:.95rem;
margin-bottom:10px;
}

.stat p{
font-size:2.2rem;
font-weight:800;
color:#00bfff;
}

.section{
margin-top:35px;
background:#11111a;
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:30px;
}

.section h2{
margin-bottom:18px;
}

.empty{
color:#888;
}

.message{
margin-top:15px;
text-align:center;
font-weight:600;
}

@media(max-width:800px){
.profile-card{
grid-template-columns:1fr;
text-align:center;
}

.profile-info h1{
font-size:2rem;
}
}
</style>
</head>

<body>

<nav class="navbar">
<div class="logo">MANTRA</div>

<div class="nav-actions">
<button class="nav-btn" onclick="window.location.href='feed-eventos.html'">
Feed
</button>
<button class="nav-btn logout" onclick="logout()">
Salir
</button>
</div>
</nav>

<main class="profile-container">

<section class="profile-card">

<div class="avatar-box">
<div class="avatar" id="avatar">
Sin foto
</div>

<label class="upload-label" for="fotoInput">
Cambiar foto
</label>

<input type="file" id="fotoInput" accept="image/png,image/jpeg,image/jpg,image/webp">

<div class="message" id="message"></div>
</div>

<div class="profile-info">
<h1 id="nombre">Cargando...</h1>
<p id="email"></p>
<p id="bio">Sin biografía.</p>
<span class="intereses" id="intereses">Sin intereses</span>
</div>
<button
id="btnEditarPerfil"
onclick="mostrarEditorPerfil()"
style="margin-top:25px;padding:13px 18px;border:none;border-radius:15px;background:#00bfff;color:white;font-weight:700;cursor:pointer;"
>
Editar perfil
</button>

<div id="editorPerfil" style="display:none;margin-top:25px;">
  <textarea id="editBio" placeholder="Editar biografía..." style="width:100%;height:90px;padding:14px;border:none;border-radius:16px;background:#1d1d29;color:white;resize:none;margin-bottom:12px;"></textarea>

  <input id="editIntereses" placeholder="Editar intereses" style="width:100%;padding:14px;border:none;border-radius:16px;background:#1d1d29;color:white;margin-bottom:12px;">

  <button onclick="guardarPerfil()" style="padding:13px 18px;border:none;border-radius:15px;background:#00bfff;color:white;font-weight:700;cursor:pointer;">
    Guardar cambios
  </button>

  <button onclick="ocultarEditorPerfil()" style="padding:13px 18px;border:none;border-radius:15px;background:#1d1d29;color:white;font-weight:700;cursor:pointer;margin-left:8px;">
    Cancelar
  </button>
</div>
</section>

<section class="stats">
<div class="stat">
<h3>Eventos asistidos</h3>
<p id="eventosAsistidos">0</p>
</div>

<div class="stat">
<h3>Reseñas publicadas</h3>
<p id="totalResenas">0</p>
</div>

<div class="stat">
<h3>Tipo de cuenta</h3>
<p>🎟️</p>
</div>
</section>

<section class="section">
  <h2>Actividad reciente</h2>

  <h3 style="margin-bottom:15px;">🎟 Eventos asistidos</h3>
  <div id="actividadEventos"></div>

  <h3 style="margin:25px 0 15px;">⭐ Reseñas hechas</h3>
  <div id="actividadResenas"></div>
</section>

</main>

<script>
const usuario = JSON.parse(localStorage.getItem('usuarioMantra'));

if(!usuario){
window.location.href = 'index.html';
}

async function cargarPerfil(){
try{
const response = await fetch(`/api/perfil/${usuario.id_usuario}`);
const perfil = await response.json();

document.getElementById('nombre').innerText =
perfil.nombre || usuario.nombre;

document.getElementById('email').innerText =
perfil.email || '';

document.getElementById('bio').innerText =
perfil.biografia || 'Sin biografía.';

document.getElementById('intereses').innerText =
perfil.intereses || 'Sin intereses registrados';
  
document.getElementById('editBio').value =
perfil.biografia || '';

document.getElementById('editIntereses').value =
perfil.intereses || '';

document.getElementById('eventosAsistidos').innerText =
perfil.eventos_asistidos || 0;

document.getElementById('totalResenas').innerText =
perfil.total_resenas || 0;

const avatar = document.getElementById('avatar');

if(perfil.foto_perfil){
avatar.innerHTML =
`<img src="${perfil.foto_perfil}" alt="Foto de perfil">`;
}else{
avatar.innerText = 'Sin foto';
}

}catch(error){
console.error(error);
}
}

document.getElementById('fotoInput').addEventListener('change', async()=>{

const file = document.getElementById('fotoInput').files[0];
const message = document.getElementById('message');

if(!file) return;

const formData = new FormData();
formData.append('foto', file);
formData.append('id_usuario', usuario.id_usuario);

try{
message.style.color = '#ccc';
message.innerText = 'Subiendo foto...';

const response = await fetch('/api/perfil/foto',{
method:'POST',
body:formData
});

const data = await response.json();

if(!response.ok){
message.style.color = '#ff5a5a';
message.innerText = data.error || 'Error subiendo foto';
return;
}

message.style.color = '#00ff99';
message.innerText = 'Foto actualizada';

cargarPerfil();

}catch(error){
console.error(error);
message.style.color = '#ff5a5a';
message.innerText = 'Error de conexión';
}
});

function logout(){
localStorage.removeItem('usuarioMantra');
window.location.href = 'index.html';
}
  
function mostrarEditorPerfil(){
  document.getElementById('editorPerfil').style.display = 'block';
  document.getElementById('btnEditarPerfil').style.display = 'none';
}

function ocultarEditorPerfil(){
  document.getElementById('editorPerfil').style.display = 'none';
  document.getElementById('btnEditarPerfil').style.display = 'inline-block';
}
async function guardarPerfil(){
  const biografia = document.getElementById('editBio').value;
  const intereses = document.getElementById('editIntereses').value;

  try{
    const response = await fetch(`/api/perfil/${usuario.id_usuario}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify({ biografia, intereses })
    });

    const data = await response.json();

    if(!response.ok){
      alert(data.error || 'Error al actualizar');
      return;
    }

    alert('Perfil actualizado');
    cargarPerfil();
    ocultarEditorPerfil();

  }catch(error){
    console.error(error);
    alert('Error de conexión');
  }
}

async function cargarActividad(){
  try{
    const response = await fetch(`/api/perfil/${usuario.id_usuario}/actividad`);
    const data = await response.json();

    const eventosDiv = document.getElementById('actividadEventos');
    const resenasDiv = document.getElementById('actividadResenas');

    eventosDiv.innerHTML = '';
    resenasDiv.innerHTML = '';

    if(data.eventos.length === 0){
      eventosDiv.innerHTML = '<p class="empty">Aún no has asistido a eventos.</p>';
    }else{
      data.eventos.forEach(evento => {
        eventosDiv.innerHTML += `
          <div style="background:#181824;padding:18px;border-radius:18px;margin-bottom:12px;">
            <strong>${evento.titulo}</strong>
            <p style="color:#aaa;">📅 ${new Date(evento.fecha).toLocaleDateString('es-MX')} · ${evento.ciudad || ''}</p>
          </div>
        `;
      });
    }

    if(data.resenas.length === 0){
      resenasDiv.innerHTML = '<p class="empty">Aún no has publicado reseñas.</p>';
    }else{
      data.resenas.forEach(resena => {
        resenasDiv.innerHTML += `
          <div style="background:#181824;padding:18px;border-radius:18px;margin-bottom:12px;">
            <strong>${resena.titulo}</strong>
            <p style="color:#ffd700;">${'⭐'.repeat(resena.calificacion)}</p>
            <p style="color:#ccc;">${resena.comentario || 'Sin comentario'}</p>
          </div>
        `;
      });
    }

  }catch(error){
    console.error(error);
  }
}
  
cargarPerfil();
cargarActividad();
</script>

</body>
</html>
